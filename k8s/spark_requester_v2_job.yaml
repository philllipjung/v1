apiVersion: batch/v1
kind: Job
metadata:
  name: spark-requester-v2
  namespace: default
spec:
  backoffLimit: 0  # 실패 시 재시도하지 않음
  template:
    metadata:
      labels:
        app: spark-requester-v2
    spec:
      restartPolicy: Never  # Job이 한 번만 실행되고 종료
      containers:
      - name: spark-requester-v2
        image: spark-requester-v2:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KUBERNETES_SERVICE_HOST
          value: "true"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
